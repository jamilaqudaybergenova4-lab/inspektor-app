<!DOCTYPE html>
<html lang="kaa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JXQ Inspektor Plansheti</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen p-4">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold mb-6 text-center">JXQ Inspektor</h1>
        
        <input type="text" id="nomer" placeholder="Nomerdi kiritiń (mısalı: 01A123AA)" 
               class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 mb-4 focus:outline-none focus:border-blue-500">
        
        <button onclick="izlew()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Izlew</button>
        
        <div id="natiyje" class="mt-6"></div>
    </div>

    <script>
        const BAZA = {
            "01A123AA": { ati: "Aliyev Bobur", ball: 3.5 },
            "10B456BB": { ati: "Karimov Sultan", ball: 6.0 }
        };

        function izlew() {
            const nomer = document.getElementById('nomer').value.toUpperCase().replace(/\s/g, '');
            const natiyje = document.getElementById('natiyje');
            
            if(BAZA[nomer]) {
                natiyje.innerHTML = `<div class="bg-emerald-900 p-4 rounded-lg">
                    <p>Aydawshı: <strong>${BAZA[nomer].ati}</strong></p>
                    <p>Ball: ${BAZA[nomer].ball} / 12</p>
                </div>`;
            } else {
                natiyje.innerHTML = `<div class="bg-red-900 p-4 rounded-lg text-center">Tabılmadı!</div>`;
            }
        }
    </script>
</body>
</html>
